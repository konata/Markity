name: Release

# Builds the Chrome, Firefox and macOS (Tauri) artifacts on a macOS runner and
# attaches them to the GitHub Release for the pushed tag. The site's download
# buttons use the stable .../releases/latest/download/<asset> path, so a new tag
# is all it takes to ship a new version end-to-end. No secrets required.
#
# Electron is deprecated: its source is kept in the repo but it is no longer built
# or published here. The macOS app now ships from the Tauri target.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - run: bun install --frozen-lockfile

      - name: Build extensions
        run: |
          bun run pack:chrome
          bun run pack:firefox

      - name: Build macOS app (Tauri)
        run: bun run tauri:build

      - name: Stage macOS app
        run: |
          mkdir -p artifacts/macos
          ditto -c -k --sequesterRsrc --keepParent \
            "macos/target/release/bundle/macos/Markity.app" \
            artifacts/macos/markity-macos-arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: markity-artifacts
          path: |
            artifacts/chrome/markity-chrome.zip
            artifacts/firefox/markity-firefox.xpi
            artifacts/macos/markity-macos-arm64.zip

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/chrome/markity-chrome.zip
            artifacts/firefox/markity-firefox.xpi
            artifacts/macos/markity-macos-arm64.zip
